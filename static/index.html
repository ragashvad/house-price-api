<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 House Price Predictor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1a1a1a;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 480px;
            width: 100%;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .subtitle {
            color: #666;
            margin-bottom: 32px;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            font-family: inherit;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            margin-top: 24px;
            padding: 20px;
            background: #f3f4f6;
            border-radius: 12px;
            text-align: center;
            display: none;
        }

        .result.visible {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        .result-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-value {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .error {
            margin-top: 16px;
            padding: 12px 16px;
            background: #fee2e2;
            color: #991b1b;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .error.visible {
            display: block;
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
            color: #999;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 House Price Predictor</h1>
        <p class="subtitle">Estimate house prices using a PyTorch ML model</p>

        <form id="predictForm">
            <div class="form-group">
                <label for="size">Size (m²)</label>
                <input type="number" id="size" name="size" value="180" min="1" step="0.1" required>
            </div>

            <div class="form-group">
                <label for="bedrooms">Bedrooms</label>
                <input type="number" id="bedrooms" name="bedrooms" value="3" min="1" max="10" required>
            </div>

            <div class="form-group">
                <label for="age">Age (years)</label>
                <input type="number" id="age" name="age" value="12" min="0" step="0.1" required>
            </div>

            <button type="submit" id="submitBtn">Predict Price</button>
        </form>

        <div class="error" id="errorBox"></div>

        <div class="result" id="resultBox">
            <div class="result-label">Estimated Price</div>
            <div class="result-value" id="resultValue">$0.00k</div>
        </div>

        <div class="footer">
            Powered by <a href="/docs">FastAPI</a> + PyTorch
        </div>
    </div>

    <script>
        const form = document.getElementById('predictForm');
        const submitBtn = document.getElementById('submitBtn');
        const resultBox = document.getElementById('resultBox');
        const resultValue = document.getElementById('resultValue');
        const errorBox = document.getElementById('errorBox');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Hide previous result/error
            resultBox.classList.remove('visible');
            errorBox.classList.remove('visible');

            // Disable button while loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Predicting...';

            // Get form values
            const size = parseFloat(document.getElementById('size').value);
            const bedrooms = parseInt(document.getElementById('bedrooms').value);
            const age = parseFloat(document.getElementById('age').value);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ size, bedrooms, age })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail?.[0]?.msg || 'Prediction failed');
                }

                const data = await response.json();
                resultValue.textContent = data.predicted_price_formatted;
                resultBox.classList.add('visible');
            } catch (err) {
                errorBox.textContent = `Error: ${err.message}`;
                errorBox.classList.add('visible');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Predict Price';
            }
        });
    </script>
</body>
</html>
